<!DOCTYPE html><html>
<head>
  <title>Lite Momentum Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-black text-white p-4">  <h1 class="text-xl font-bold mb-4">🚀 Lite Momentum Scanner</h1>  <button onclick="loadData()" class="bg-green-500 px-4 py-2 rounded mb-4">
    Scan Market
  </button>  <div id="results">Click "Scan Market" to start</div>  <script>
    async function loadData() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "🔄 Scanning market...";

      try {
        const res = await fetch("https://api.dexscreener.com/latest/dex/search/?q=solana");
        const data = await res.json();

        let tokens = (data.pairs || []).slice(0, 20);

        if (tokens.length === 0) {
          resultsDiv.innerHTML = "❌ No data found. Try again.";
          return;
        }

        let html = "";

        tokens.forEach(t => {
          if (!t.baseToken) return;

          let volume = t.volume?.h24 || 0;
          let priceChange = t.priceChange?.h24 || 0;

          let score = Math.min(100,
            (volume / 100000) * 40 +
            (priceChange) * 2
          );

          let earlyTag = priceChange < 15 ? "🟢 Early" : "🔴 Pumped";

          html += `
            <div class="border border-gray-700 p-3 mb-3 rounded">
              <div class="font-bold text-lg">${t.baseToken.name}</div>
              <div class="text-sm text-gray-400">${t.baseToken.symbol}</div>

              <div>💰 Price: $${Number(t.priceUsd || 0).toFixed(6)}</div>
              <div>📊 Volume (24h): ${volume.toLocaleString()}</div>
              <div>📈 Change: ${priceChange.toFixed(2)}%</div>

              <div class="mt-1">⚡ Score: <b>${score.toFixed(0)}</b></div>
              <div>${earlyTag}</div>

              <div class="mt-2 flex gap-2">
                <a href="${t.url}" target="_blank" class="bg-blue-500 px-2 py-1 rounded text-sm">Chart</a>
                <button onclick="copyCA('${t.baseToken.address}')" class="bg-gray-700 px-2 py-1 rounded text-sm">Copy CA</button>
              </div>
            </div>
          `;
        });

        resultsDiv.innerHTML = html;

      } catch (err) {
        console.error(err);
        document.getElementById("results").innerHTML =
          "❌ Error loading data. Check internet or try again.";
      }
    }

    function copyCA(address) {
      navigator.clipboard.writeText(address);
      alert("Contract Address Copied!");
    }
  </script></body>
</html>
