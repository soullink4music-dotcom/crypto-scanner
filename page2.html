<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNIPER • Jupiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-5xl mx-auto p-4">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-purple-500 to-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🪐</div>
                <div class="font-display text-4xl tracking-tighter">SNIPER</div>
            </div>
            <button onclick="location.reload()" class="flex items-center gap-x-2 bg-zinc-900 hover:bg-zinc-800 px-5 py-2.5 rounded-3xl text-sm font-medium">
                <i class="fa-solid fa-sync"></i> Refresh
            </button>
        </div>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        const tokens = [
            {symbol:"MOONCAT", price:0.00003482, liq:18450, vol:67200, change:18.4, score:87, signals:["NEW","PUMP"], addr:"7xKX...sg4U", rug:"SAFE"},
            {symbol:"PEPEAI", price:0.00000891, liq:8750, vol:28900, change:11.7, score:76, signals:["NEW","PUMP"], addr:"9WzD...B3vA", rug:"MEDIUM"},
            {symbol:"DOGE420", price:0.000000124, liq:23100, vol:124500, change:34.8, score:92, signals:["TREND"], addr:"3xR4...T7v", rug:"HIGH RISK"},
            {symbol:"TRUMPWIF", price:0.0000673, liq:14200, vol:45600, change:9.8, score:68, signals:["NEW"], addr:"8vNq...T7v", rug:"SAFE"}
        ];

        function createCard(t) {
            let sig = '';
            t.signals.forEach(s => {
                if (s==="NEW") sig += `<span class="px-3 py-1 bg-emerald-600/30 text-emerald-400 text-xs rounded-full">🆕 NEW</span>`;
                else if (s==="PUMP") sig += `<span class="px-3 py-1 bg-orange-600/30 text-orange-400 text-xs rounded-full">🔥 PUMP</span>`;
                else sig += `<span class="px-3 py-1 bg-violet-600/30 text-violet-400 text-xs rounded-full">🚀 TREND</span>`;
            });

            return `
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5">
                <div class="flex justify-between">
                    <div>
                        <div class="text-2xl font-bold">${t.symbol}</div>
                        <div class="font-mono text-xs text-zinc-500">${t.addr}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-5xl font-black text-emerald-400">${t.score}</div>
                        <div class="text-xs text-zinc-500">SCORE</div>
                    </div>
                </div>
                <div class="flex gap-2 mt-4">${sig}</div>
                <div class="grid grid-cols-4 gap-3 mt-6 text-center">
                    <div><div class="text-xs text-zinc-500">PRICE</div><div class="font-mono text-sm">$${t.price}</div></div>
                    <div><div class="text-xs text-zinc-500">LIQ</div><div class="font-mono text-sm">$${(t.liq/1000).toFixed(0)}k</div></div>
                    <div><div class="text-xs text-zinc-500">VOL</div><div class="font-mono text-sm">$${(t.vol/1000).toFixed(0)}k</div></div>
                    <div><div class="text-xs text-zinc-500">24H</div><div class="font-mono text-sm text-emerald-400">+${t.change}%</div></div>
                </div>
                <div class="mt-6 pt-4 border-t border-zinc-800 flex justify-between items-center text-sm">
                    <span>RugCheck</span>
                    <span class="px-4 py-1 text-xs font-bold rounded-full ${t.rug==='SAFE'?'bg-emerald-500/20 text-emerald-400':'bg-amber-500/20 text-amber-400'}">${t.rug}</span>
                </div>
            </div>`;
        }

        document.getElementById('grid').innerHTML = tokens.map(t => createCard(t)).join('');
    </script>
</body>
</html>
