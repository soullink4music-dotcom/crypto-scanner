<!DOCTYPE html><html>
<head>
  <title>Lite Momentum Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-black text-white p-4">  <h1 class="text-xl font-bold mb-4">🚀 Lite Momentum Scanner</h1>  <button onclick="loadData()" class="bg-green-500 px-4 py-2 rounded mb-4">
    Scan Market
  </button>  <div id="results">Click "Scan Market"</div>  <script>
    async function loadData() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "🔄 Scanning real tokens...";

      try {
        // 🔥 Better endpoint
        const res = await fetch("https://api.dexscreener.com/latest/dex/search?q=usd");
        const data = await res.json();

        let tokens = (data.pairs || [])

          // ❌ Remove SOL + stablecoins
          .filter(t =>
            t.baseToken &&
            t.baseToken.symbol !== "SOL" &&
            t.baseToken.symbol !== "USDC" &&
            t.baseToken.symbol !== "USDT"
          )

          // ✅ Keep only active tokens
          .filter(t =>
            (t.volume?.h24 || 0) > 50000 &&
            (t.liquidity?.usd || 0) > 20000
          )

          .slice(0, 30);

        if (tokens.length === 0) {
          resultsDiv.innerHTML = "❌ No good tokens found. Try again.";
          return;
        }

        // 🧠 Score + sort
        tokens = tokens.map(t => {
          let volume = t.volume?.h24 || 0;
          let change = t.priceChange?.h24 || 0;

          let score = Math.min(100,
            (volume / 200000) * 50 +
            (change) * 3
          );

          return { ...t, score };
        });

        tokens.sort((a, b) => b.score - a.score);

        let html = "";

        tokens.forEach(t => {
          let early = t.priceChange?.h24 < 20;

          html += `
            <div class="border border-gray-700 p-3 mb-3 rounded">
              <div class="font-bold text-lg">${t.baseToken.name}</div>
              <div class="text-sm text-gray-400">${t.baseToken.symbol}</div>

              <div>💰 Price: $${Number(t.priceUsd || 0).toFixed(6)}</div>
              <div>📊 Volume: ${Number(t.volume?.h24 || 0).toLocaleString()}</div>
              <div>📈 Change: ${Number(t.priceChange?.h24 || 0).toFixed(2)}%</div>
              <div>💧 Liquidity: ${Number(t.liquidity?.usd || 0).toLocaleString()}</div>

              <div class="mt-1">⚡ Score: <b>${t.score.toFixed(0)}</b></div>
              <div>${early ? "🟢 Early" : "🔴 Pumped"}</div>

              <div class="mt-2 flex gap-2">
                <a href="${t.url}" target="_blank" class="bg-blue-500 px-2 py-1 rounded text-sm">Chart</a>
                <button onclick="copyCA('${t.baseToken.address}')" class="bg-gray-700 px-2 py-1 rounded text-sm">Copy CA</button>
              </div>
            </div>
          `;
        });

        resultsDiv.innerHTML = html;

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "❌ Error loading market.";
      }
    }

    function copyCA(addr) {
      navigator.clipboard.writeText(addr);
      alert("Copied!");
    }
  </script></body>
</html>
