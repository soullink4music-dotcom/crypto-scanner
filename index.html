<!DOCTYPE html><html>
<head>
  <title>Lite Crypto Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-black text-white p-4">
  <h1 class="text-xl font-bold mb-4">🚀 Lite Momentum Scanner</h1>  <button onclick="loadData()" class="bg-green-500 px-4 py-2 rounded mb-4">
    Scan Market
  </button>  <div id="results"></div>  <script>
    async function loadData() {
      document.getElementById("results").innerHTML = "Loading...";

      const res = await fetch("https://api.dexscreener.com/latest/dex/pairs/solana");
      const data = await res.json();

      let tokens = data.pairs.slice(0, 20);

      let html = "";

      tokens.forEach(t => {
        let score = Math.floor(Math.random() * 100);

        html += `
          <div class="border p-3 mb-2 rounded">
            <div class="font-bold">${t.baseToken.name}</div>
            <div>Price: $${t.priceUsd}</div>
            <div>Volume: ${t.volume.h24}</div>
            <div>Score: ${score}</div>
          </div>
        `;
      });

      document.getElementById("results").innerHTML = html;
    }
  </script></body>
</html>
