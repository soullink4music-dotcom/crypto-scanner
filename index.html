<!DOCTYPE html><html>
<head>
  <title>Lite Momentum Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-black text-white p-4">  <h1 class="text-xl font-bold mb-2">🚀 Smart Momentum Scanner</h1>
  <p class="text-gray-400 text-sm mb-4">Filtering high-probability early tokens</p>  <button onclick="loadData()" class="bg-green-500 px-4 py-2 rounded mb-4">
    Scan Smart Opportunities
  </button>  <div id="results">Click to scan</div>  <script>
    async function loadData() {
      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "🧠 Scanning smart plays...";

      try {
        const res = await fetch("https://api.dexscreener.com/latest/dex/search?q=usd");
        const data = await res.json();

        let tokens = (data.pairs || [])

          // ❌ Remove SOL & stables
          .filter(t =>
            t.baseToken &&
            !["SOL","USDC","USDT"].includes(t.baseToken.symbol)
          )

          // ✅ Smart Filter Conditions
          .filter(t => {
            let volume = t.volume?.h24 || 0;
            let liquidity = t.liquidity?.usd || 0;
            let change = t.priceChange?.h24 || 0;

            return (
              liquidity > 20000 &&              // must have liquidity
              liquidity < 5000000 &&           // not too big (early stage)
              volume > 50000 &&                // real activity
              volume > liquidity * 0.5 &&      // strong interest vs liquidity
              change > -10 && change < 25      // not dumped or overpumped
            );
          })

          .slice(0, 25);

        if (tokens.length === 0) {
          resultsDiv.innerHTML = "❌ No smart opportunities found.";
          return;
        }

        // 🧠 Score System
        tokens = tokens.map(t => {
          let volume = t.volume?.h24 || 0;
          let liquidity = t.liquidity?.usd || 0;
          let change = t.priceChange?.h24 || 0;

          let score =
            (volume / liquidity) * 40 +   // strength of activity
            (25 - Math.abs(change)) * 2 + // earlier = better
            (liquidity < 1000000 ? 20 : 10); // bonus for low cap

          return { ...t, score };
        });

        // 🔥 Sort best first
        tokens.sort((a, b) => b.score - a.score);

        let html = "";

        tokens.forEach(t => {
          let early = t.priceChange?.h24 < 15;

          html += `
            <div class="border border-gray-700 p-3 mb-3 rounded">
              <div class="font-bold text-lg">${t.baseToken.name}</div>
              <div class="text-sm text-gray-400">${t.baseToken.symbol}</div>

              <div>💰 Price: $${Number(t.priceUsd || 0).toFixed(6)}</div>
              <div>📊 Volume: ${Number(t.volume?.h24 || 0).toLocaleString()}</div>
              <div>💧 Liquidity: ${Number(t.liquidity?.usd || 0).toLocaleString()}</div>
              <div>📈 Change: ${Number(t.priceChange?.h24 || 0).toFixed(2)}%</div>

              <div class="mt-1">⚡ Score: <b>${t.score.toFixed(0)}</b></div>
              <div>${early ? "🟢 EARLY GEM" : "🔴 LATE"}</div>

              <div class="mt-2 flex gap-2">
                <a href="${t.url}" target="_blank" class="bg-blue-500 px-2 py-1 rounded text-sm">Chart</a>
                <button onclick="copyCA('${t.baseToken.address}')" class="bg-gray-700 px-2 py-1 rounded text-sm">Copy CA</button>
              </div>
            </div>
          `;
        });

        resultsDiv.innerHTML = html;

      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = "❌ Error loading smart scan.";
      }
    }

    function copyCA(addr) {
      navigator.clipboard.writeText(addr);
      alert("Copied!");
    }
  </script></body>
</html>
